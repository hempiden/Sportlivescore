<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHL Games Day - Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --dhl-yellow: #FFCC00; --dhl-red: #D40511; }
        body { background-color: #f4f4f4; font-family: 'Kantumruy Pro', sans-serif; }
        .font-dhl { font-family: 'Inter', sans-serif; font-weight: 900; text-transform: uppercase; }
        
        /* Checkerboard Pattern */
        .checker-bg {
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f0f0 75%), linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .hero-gradient {
            background: var(--dhl-yellow);
            border-bottom: 8px solid var(--dhl-red);
        }
        .vs-tag { background: var(--dhl-red); color: white; clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        .bracket-card { border-left: 6px solid var(--dhl-red); background: white; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-white p-4 flex justify-between items-center shadow-sm border-b-4 border-[#FFCC00]">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/DHL_Logo.svg/1200px-DHL_Logo.svg.png" class="h-6" alt="DHL">
        <div class="text-center">
            <div class="text-[#D40511] font-black italic text-xl leading-none font-dhl">GAMES DAY</div>
            <div class="text-[10px] font-bold tracking-[0.2em]">#GAMEONASONE</div>
        </div>
        <div class="bg-[#D40511] text-white text-[10px] px-3 py-1 font-bold rounded">LIVE</div>
    </header>

    <!-- Hero: Active Match -->
    <section class="hero-gradient py-12 px-4 text-center relative overflow-hidden">
        <div class="container mx-auto relative z-10">
            <h2 class="font-dhl text-4xl md:text-6xl italic mb-8 tracking-tighter">Active Match</h2>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-16">
                <div class="text-3xl md:text-5xl font-dhl italic" id="hero-t1">TEAM A</div>
                <div class="bg-black text-[#FFCC00] text-6xl md:text-8xl font-dhl px-8 py-4 rounded-xl shadow-2xl" id="hero-score">0 : 0</div>
                <div class="text-3xl md:text-5xl font-dhl italic" id="hero-t2">TEAM B</div>
            </div>
            <div class="mt-8 inline-block vs-tag px-10 py-2 font-dhl italic text-xl">SOCCER</div>
        </div>
    </section>

    <div class="checker-bg py-12">
        <div class="container mx-auto px-4 space-y-20">
            
            <!-- Tournament Bracket -->
            <section>
                <h3 class="font-dhl text-2xl italic mb-8 border-b-4 border-[#D40511] inline-block">Tournament Bracket</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                    <div class="space-y-6">
                        <div class="bracket-card p-4 shadow-md">
                            <div class="flex justify-between font-bold border-b pb-1 mb-1"><span>SF1 - T1</span> <span class="text-[#D40511]" id="sf1-s1">0</span></div>
                            <div class="flex justify-between font-bold"><span>SF1 - T2</span> <span class="text-[#D40511]" id="sf1-s2">0</span></div>
                        </div>
                        <div class="bracket-card p-4 shadow-md">
                            <div class="flex justify-between font-bold border-b pb-1 mb-1"><span>SF2 - T1</span> <span class="text-[#D40511]" id="sf2-s1">0</span></div>
                            <div class="flex justify-between font-bold"><span>SF2 - T2</span> <span class="text-[#D40511]" id="sf2-s2">0</span></div>
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="bg-white p-8 rounded-2xl shadow-xl border-4 border-[#FFCC00] inline-block min-w-[250px]">
                            <div class="font-dhl text-[#D40511] text-xl mb-4 italic">Grand Final</div>
                            <div class="font-bold text-lg" id="final-t1">Winner SF1</div>
                            <div class="font-dhl text-3xl my-2">VS</div>
                            <div class="font-bold text-lg" id="final-t2">Winner SF2</div>
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="bg-[#D40511] text-white p-8 rounded-full w-48 h-48 mx-auto flex flex-col justify-center items-center shadow-2xl">
                            <div class="text-[10px] font-bold uppercase tracking-widest mb-2">Champion</div>
                            <div class="font-dhl text-2xl italic" id="grand-winner">TBD</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Single Games -->
            <section>
                <h3 class="font-dhl text-2xl italic mb-8 border-b-4 border-[#D40511] inline-block">Single Matches</h3>
                <div id="single-matches-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Injected by JS -->
                </div>
            </section>

            <!-- Swimming -->
            <section>
                <h3 class="font-dhl text-2xl italic mb-8 border-b-4 border-[#D40511] inline-block">Swimming Ranking</h3>
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-black text-[#FFCC00] font-dhl italic uppercase text-xs">
                            <tr><th class="p-4">Rank</th><th class="p-4">Athlete</th><th class="p-4 text-right">Result</th></tr>
                        </thead>
                        <tbody id="swimming-list" class="divide-y"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadData() {
            const { data: matches } = await supabaseClient.from('matches').select('*');
            const { data: swimmers } = await supabaseClient.from('swimming_results').select('*').order('rank', { ascending: true });

            if(matches) {
                const live = matches.find(m => m.status === 'Live') || matches[0];
                document.getElementById('hero-t1').innerText = live.team_a;
                document.getElementById('hero-t2').innerText = live.team_b;
                document.getElementById('hero-score').innerText = `${live.score_a} : ${live.score_b}`;

                matches.forEach(m => {
                    if(m.match_label === 'SF1') { document.getElementById('sf1-s1').innerText = m.score_a; document.getElementById('sf1-s2').innerText = m.score_b; }
                    if(m.match_label === 'SF2') { document.getElementById('sf2-s1').innerText = m.score_a; document.getElementById('sf2-s2').innerText = m.score_b; }
                    if(m.match_label === 'Final') {
                        document.getElementById('final-t1').innerText = m.team_a;
                        document.getElementById('final-t2').innerText = m.team_b;
                        if(m.status === 'Finished') document.getElementById('grand-winner').innerText = m.score_a > m.score_b ? m.team_a : m.team_b;
                    }
                });

                const singles = matches.filter(m => m.sport_name === 'Pingpong' || m.sport_name === 'Badminton');
                document.getElementById('single-matches-grid').innerHTML = singles.map(m => `
                    <div class="bg-white p-6 rounded shadow-md border-t-4 border-[#D40511]">
                        <div class="text-[10px] font-bold text-gray-400 uppercase mb-2">${m.sport_name}</div>
                        <div class="flex justify-between items-center font-dhl italic">
                            <span>${m.team_a}</span>
                            <span class="text-2xl text-[#D40511]">${m.score_a}-${m.score_b}</span>
                            <span>${m.team_b}</span>
                        </div>
                    </div>
                `).join('');
            }

            if(swimmers) {
                document.getElementById('swimming-list').innerHTML = swimmers.map(s => `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 font-dhl text-[#D40511]">#${s.rank}</td>
                        <td class="p-4 font-bold uppercase text-sm">${s.name}</td>
                        <td class="p-4 text-right font-mono">${s.result_time}</td>
                    </tr>
                `).join('');
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
