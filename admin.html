<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BIGAMER Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #05070a; color: white; font-family: 'Kantumruy Pro', sans-serif; }
        .oswald { font-family: 'Oswald', sans-serif; }
        .neon-pink { color: #ff005c; text-shadow: 0 0 10px rgba(255, 0, 92, 0.5); }
        .bg-dark-card { background: rgba(15, 17, 26, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .drop-zone-active { border: 2px dashed #ff005c; background: rgba(255, 0, 92, 0.1); }
        
        /* ស្ទីលសម្រាប់រូបភាព Share */
        #share-template {
            width: 800px; height: 450px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1504450758481-7338eba7524a?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            border: 8px solid #ff005c;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; left: -9999px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 bg-black border-b border-white/10 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-pink-600 text-white font-black px-3 py-1 italic oswald text-xl">BIGAMER</div>
            <h1 class="text-sm font-bold uppercase tracking-widest hidden md:block">Control Panel</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="deleteSelectedPlayers()" id="delete-btn" class="hidden bg-red-600 hover:bg-red-700 text-white px-4 py-1 rounded text-xs font-bold uppercase">Delete Selected</button>
            <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 px-4 py-1 rounded text-xs font-bold uppercase">Refresh</button>
        </div>
    </header>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-0">
        
        <!-- Sidebar: Player Management -->
        <aside class="lg:col-span-3 border-r border-white/10 p-6 bg-black/40 overflow-y-auto max-h-screen">
            <h2 class="text-lg font-bold oswald uppercase italic neon-pink mb-6">Player Management</h2>
            
            <!-- Add Player Form -->
            <div class="space-y-3 mb-8">
                <input type="text" id="new-player-name" placeholder="ឈ្មោះកីឡាករ/ក្រុម" class="w-full bg-white/5 border border-white/10 p-2 rounded text-sm focus:border-pink-600 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <select id="new-player-sport" class="bg-white/5 border border-white/10 p-2 rounded text-xs">
                        <option value="Soccer">Soccer</option>
                        <option value="Volleyball">Volleyball</option>
                        <option value="Pingpong">Pingpong</option>
                        <option value="Badminton">Badminton</option>
                        <option value="Swimming">Swimming</option>
                    </select>
                    <button onclick="addNewPlayer()" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-2 rounded text-xs uppercase">Add New</button>
                </div>
                <div class="relative">
                    <input type="file" id="excel-upload" accept=".xlsx, .xls" class="hidden" onchange="handleExcelUpload(event)">
                    <button onclick="document.getElementById('excel-upload').click()" class="w-full border border-dashed border-white/30 py-2 rounded text-[10px] uppercase hover:bg-white/5">Upload Excel List</button>
                </div>
            </div>

            <!-- Player List with Drag & Multi-select -->
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] uppercase font-bold opacity-50">Player List</span>
                <label class="text-[10px] flex items-center gap-1 cursor-pointer"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"> Select All</label>
            </div>
            <div id="player-list" class="space-y-2 min-h-[200px]">
                <!-- Players will be loaded here -->
            </div>

            <!-- Trash Zone (Drag here to delete) -->
            <div id="trash-zone" class="mt-10 p-6 border-2 border-dashed border-white/10 rounded-xl text-center text-gray-500 transition">
                <span class="text-xs uppercase font-bold">Drag here to remove</span>
            </div>
        </aside>

        <!-- Main Content: Match Management -->
        <main class="lg:col-span-9 p-8 overflow-y-auto">
            
            <!-- Matching Controls -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
                <div class="bg-dark-card p-4 rounded-xl">
                    <h4 class="text-xs font-bold uppercase opacity-50 mb-3">Soccer / Volleyball</h4>
                    <button onclick="generateMatches('Soccer')" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded text-xs font-bold uppercase">Auto Random Team</button>
                </div>
                <div class="bg-dark-card p-4 rounded-xl">
                    <h4 class="text-xs font-bold uppercase opacity-50 mb-3">Pingpong / Badminton</h4>
                    <button onclick="generateMatches('Badminton')" class="w-full bg-purple-600 hover:bg-purple-700 py-2 rounded text-xs font-bold uppercase">Lucky Draw Match</button>
                </div>
                <div class="bg-dark-card p-4 rounded-xl">
                    <h4 class="text-xs font-bold uppercase opacity-50 mb-3">Swimming</h4>
                    <button onclick="initSwimming()" class="w-full bg-cyan-600 hover:bg-cyan-700 py-2 rounded text-xs font-bold uppercase">Start Ranking</button>
                </div>
                <div class="bg-dark-card p-4 rounded-xl border-pink-600/50">
                    <h4 class="text-xs font-bold uppercase opacity-50 mb-3">System Action</h4>
                    <button onclick="clearAllMatches()" class="w-full border border-red-600 text-red-600 py-2 rounded text-xs font-bold uppercase hover:bg-red-600 hover:text-white">Clear All Matches</button>
                </div>
            </div>

            <!-- Live Matches Grid -->
            <h3 class="text-2xl font-black oswald uppercase italic mb-6 border-l-4 border-pink-600 pl-4">Live Match Scoring</h3>
            <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Matches will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Share Template (Hidden) -->
    <div id="share-template">
        <div class="text-pink-600 font-black oswald text-4xl italic mb-2 tracking-tighter">BIGAMER CHAMPIONSHIP</div>
        <div id="share-sport" class="text-sm tracking-[0.6em] text-white/70 mb-12 uppercase font-bold">SOCCER</div>
        <div class="flex items-center justify-center gap-12 w-full px-10">
            <div id="share-t1" class="text-5xl font-black oswald uppercase italic flex-1 text-right">TEAM A</div>
            <div id="share-score" class="text-8xl font-black oswald italic text-white bg-pink-600 px-8 py-2 skew-x-[-10deg]">0 : 0</div>
            <div id="share-t2" class="text-5xl font-black oswald uppercase italic flex-1 text-left">TEAM B</div>
        </div>
        <div class="mt-16 text-xs text-white/40 uppercase font-bold tracking-widest">Official Match Result • t.me/bigamer_sports</div>
    </div>

    <script>
        // --- Supabase Configuration ---
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Player Management Logic ---

        async function fetchPlayers() {
            const { data, error } = await supabaseClient.from('participants').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            
            data.forEach(p => {
                const item = document.createElement('div');
                item.className = "bg-white/5 p-3 rounded flex items-center justify-between group cursor-move border border-transparent hover:border-pink-600/50";
                item.setAttribute('data-id', p.id);
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="player-checkbox" value="${p.id}" onchange="updateDeleteBtn()">
                        <div>
                            <div class="text-sm font-bold">${p.name}</div>
                            <div class="text-[10px] text-pink-600 uppercase font-bold">${p.sport_type}</div>
                        </div>
                    </div>
                    <span class="opacity-0 group-hover:opacity-100 text-gray-500">⠿</span>
                `;
                list.appendChild(item);
            });

            // Initialize Drag & Drop
            new Sortable(list, {
                group: 'players',
                animation: 150,
                onEnd: async (evt) => {
                    if (evt.to.id === 'trash-zone') {
                        const id = evt.item.getAttribute('data-id');
                        await deletePlayer(id);
                    }
                }
            });

            new Sortable(document.getElementById('trash-zone'), {
                group: 'players',
                onAdd: (evt) => evt.item.remove()
            });
        }

        async function addNewPlayer() {
            const name = document.getElementById('new-player-name').value;
            const sport = document.getElementById('new-player-sport').value;
            if(!name) return;

            await supabaseClient.from('participants').insert([{ name, sport_type: sport }]);
            document.getElementById('new-player-name').value = '';
            fetchPlayers();
        }

        async function handleExcelUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                const toInsert = rows.map(r => ({
                    name: r.Name || r.name,
                    sport_type: r.Sport || r.sport || document.getElementById('new-player-sport').value
                }));

                await supabaseClient.from('participants').insert(toInsert);
                fetchPlayers();
            };
            reader.readAsBinaryString(file);
        }

        async function deletePlayer(id) {
            await supabaseClient.from('participants').delete().eq('id', id);
            fetchPlayers();
        }

        async function deleteSelectedPlayers() {
            const checked = Array.from(document.querySelectorAll('.player-checkbox:checked')).map(cb => cb.value);
            if(confirm(`លុបកីឡាករចំនួន ${checked.length} នាក់?`)) {
                await supabaseClient.from('participants').delete().in('id', checked);
                fetchPlayers();
            }
        }

        function updateDeleteBtn() {
            const checked = document.querySelectorAll('.player-checkbox:checked').length;
            document.getElementById('delete-btn').classList.toggle('hidden', checked === 0);
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('select-all').checked;
            document.querySelectorAll('.player-checkbox').forEach(cb => cb.checked = isChecked);
            updateDeleteBtn();
        }

        // --- Match Management Logic ---

        async function generateMatches(sport) {
            const { data: players } = await supabaseClient.from('participants').select('name').eq('sport_type', sport);
            if(players.length < 2) return alert("ត្រូវការកីឡាករយ៉ាងតិច ២ នាក់!");

            const shuffled = players.sort(() => 0.5 - Math.random());
            const matches = [];
            for(let i = 0; i < shuffled.length; i += 2) {
                if(shuffled[i+1]) {
                    matches.push({
                        sport_name: sport,
                        team_a: shuffled[i].name,
                        team_b: shuffled[i+1].name,
                        score_a: 0, score_b: 0,
                        status: 'Live'
                    });
                }
            }
            await supabaseClient.from('matches').insert(matches);
            fetchMatches();
        }

        async function fetchMatches() {
            const { data } = await supabaseClient.from('matches').select('*').order('created_at', { ascending: false });
            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '';

            data.forEach(m => {
                const card = document.createElement('div');
                card.className = "bg-dark-card p-6 rounded-2xl border-l-4 border-pink-600";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold uppercase text-pink-600">${m.sport_name}</span>
                        <span class="text-[10px] font-bold opacity-50">${new Date(m.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex-1 text-right font-bold oswald uppercase">${m.team_a}</div>
                        <div class="flex gap-2">
                            <input type="number" value="${m.score_a}" onchange="updateScore(${m.id}, this.value, null)" class="w-12 bg-white/10 border-none rounded text-center font-bold oswald text-xl p-1">
                            <input type="number" value="${m.score_b}" onchange="updateScore(${m.id}, null, this.value)" class="w-12 bg-white/10 border-none rounded text-center font-bold oswald text-xl p-1">
                        </div>
                        <div class="flex-1 text-left font-bold oswald uppercase">${m.team_b}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="downloadResult(${m.id})" class="flex-1 bg-white/5 hover:bg-white/10 py-2 rounded text-[10px] font-bold uppercase tracking-widest">Download Result Image</button>
                        <button onclick="finishMatch(${m.id})" class="bg-red-600/20 text-red-500 px-4 py-2 rounded text-[10px] font-bold uppercase">End</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function updateScore(id, sa, sb) {
            const updateData = {};
            if(sa !== null) updateData.score_a = sa;
            if(sb !== null) updateData.score_b = sb;
            await supabaseClient.from('matches').update(updateData).eq('id', id);
        }

        async function downloadResult(id) {
            const { data: m } = await supabaseClient.from('matches').select('*').eq('id', id).single();
            
            document.getElementById('share-sport').innerText = m.sport_name;
            document.getElementById('share-t1').innerText = m.team_a;
            document.getElementById('share-t2').innerText = m.team_b;
            document.getElementById('share-score').innerText = `${m.score_a} : ${m.score_b}`;

            const template = document.getElementById('share-template');
            html2canvas(template, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Result_${m.team_a}_vs_${m.team_b}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        async function clearAllMatches() {
            if(confirm("តើអ្នកចង់លុបការប្រកួតទាំងអស់មែនទេ?")) {
                await supabaseClient.from('matches').delete().neq('id', 0);
                fetchMatches();
            }
        }

        window.onload = () => {
            fetchPlayers();
            fetchMatches();
        };
    </script>
</body>
</html>
